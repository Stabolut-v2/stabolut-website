<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50">
  <!-- Hexagonal gem icon - white on transparent -->
  <g transform="translate(3,2)">
    <!-- Outer hexagon -->
    <polygon points="25,2 46,14 46,38 25,50 4,38 4,14" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.5"/>
    <!-- Inner hexagon -->
    <polygon points="25,10 38,18 38,34 25,42 12,34 12,18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <!-- Internal diamond lines -->
    <line x1="4" y1="14" x2="12" y2="18" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="46" y1="14" x2="38" y2="18" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="4" y1="38" x2="12" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="46" y1="38" x2="38" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="25" y1="2" x2="25" y2="10" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="25" y1="50" x2="25" y2="42" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <!-- Center diamond hint -->
    <line x1="25" y1="10" x2="38" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="25" y1="10" x2="12" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  </g>
  <!-- DEXTOOLS text - white -->
  <text x="62" y="36" font-family="'Inter', Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="3.5">DEXTOOLS</text>
</svg>
